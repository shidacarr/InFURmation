<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Ryzeen — Tarjeta Digital</title>

  
<style>
  :root {
    --nombre: "Fox Ryzeen";
    --especie: "El Zorro Sayan";
    --color-acento: #C91414;
    --color-acento-glow: #D261FF;
  }
</style>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 50% 0%, #26232b 0%, #17151a 55%, #100e12 100%);
    font-family: 'Inter', sans-serif;
    padding: 32px 16px;
  }

  .lanyard {
    width: 40px;
    height: 90px;
    background: repeating-linear-gradient(
      45deg,
      var(--color-acento),
      var(--color-acento) 8px,
      #2a262e 8px,
      #2a262e 16px
    );
    border-radius: 6px 6px 0 0;
    margin: 0 auto -14px auto;
    position: relative;
    z-index: 0;
  }

  .card {
    position: relative;
    width: 320px;
    background: #1c1a20;
    border: 1px solid #33303a;
    border-radius: 22px;
    padding: 36px 28px 30px;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 20px 60px -20px rgba(0,0,0,0.7),
      0 0 40px -12px var(--color-acento-glow);
  }

  .hole {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #100e12;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
    margin: 0 auto 22px;
  }

  .avatar-ring {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    margin: 0 auto 18px;
    padding: 4px;
    background: conic-gradient(var(--color-acento), var(--color-acento-glow), var(--color-acento));
  }

  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #2a262e center/cover no-repeat;
    background-image: url('FOTO_URL_AQUI.jpg');
    border: 3px solid #1c1a20;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--color-acento);
    margin-bottom: 6px;
  }

  .nombre {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 26px;
    color: #f2eee6;
    letter-spacing: 0.01em;
  }

  .especie {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #9a95a3;
    margin-top: 4px;
    margin-bottom: 24px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #38343e, transparent);
    margin-bottom: 24px;
  }

  .redes {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .red {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #232028;
    border: 1px solid #34303b;
    border-radius: 12px;
    text-decoration: none;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }

  .red:active {
    transform: scale(0.97);
  }

  .red-icono {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: var(--color-acento);
  }

  .red-texto {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
  }

  .red-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #7a7582;
    font-family: 'JetBrains Mono', monospace;
  }

  .red-valor {
    font-size: 14px;
    color: #f2eee6;
    font-weight: 500;
  }

  .footer {
    margin-top: 26px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: #524d5a;
    text-transform: uppercase;
  }
body {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(210,97,255,.25), transparent 45%),
    radial-gradient(circle at bottom right, rgba(201,20,20,.30), transparent 40%),
    linear-gradient(135deg,#130814,#1a0d22,#120c16);
}

/* Capa de zorritos */
body::before{
    content:"🦊 🦊 🦊 🦊 🦊 🦊 🦊 🦊";
    position:absolute;
    inset:0;
    display:flex;
    justify-content:space-evenly;
    align-items:space-evenly;
    flex-wrap:wrap;
    font-size:70px;
    opacity:.045;
    filter:blur(.4px);
    pointer-events:none;
    transform:rotate(-18deg) scale(1.4);
}


body::after{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,70,70,.18), transparent 25%),
      radial-gradient(circle at 80% 30%, rgba(180,0,255,.16), transparent 30%),
      radial-gradient(circle at 50% 80%, rgba(255,0,80,.12), transparent 30%);
    pointer-events:none;
}

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: subir 0.5s ease; }
    @keyframes subir {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  }
</style>
